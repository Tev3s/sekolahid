<!-- 
  Vipercell Web Update v2.3
  Feature: Persistent Storage, Fullscreen UI Auto-Hide, & Toast Optimization
  Developer: Senior AI Developer Partner (Vipercell Project)
-->
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viper Bingo Digital v2.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --viper-blue: #2563eb;
            --viper-light-bg: #f8fafc;
            --viper-card-bg: #ffffff;
            --viper-text-dark: #1e293b;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #e2e8f0 0%, #cbd5e1 100%);
            min-height: 100vh;
            color: var(--viper-text-dark);
            transition: all 0.3s ease;
        }
        .bingo-card {
            background: var(--viper-card-bg);
            border: 2px solid #e2e8f0;
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }
        .cell {
            aspect-ratio: 1/1;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: 800;
            font-size: 1.5rem;
            background: #f1f5f9;
            color: var(--viper-text-dark);
            border: 1px solid #e2e8f0;
            transition: all 0.15s ease;
        }
        .cell.marked {
            background: var(--viper-blue) !important;
            color: white !important;
            border-radius: 50%;
            transform: scale(0.85);
            border: none;
            box-shadow: 0 0 15px rgba(37, 99, 235, 0.4);
        }
        .cell.free {
            background: #f59e0b;
            color: #ffffff;
            font-size: 0.75rem;
            font-weight: 900;
        }
        .header-col {
            background: var(--viper-blue);
            color: white;
            font-weight: 900;
            padding: 12px 0;
            font-size: 1.2rem;
        }
        /* Header hiding in Fullscreen */
        .fullscreen-hide {
            transition: all 0.4s ease;
        }
        body.is-fullscreen .fullscreen-hide {
            display: none !important;
        }
        body.is-fullscreen #bingo-container {
            margin-top: 2rem;
        }
        .btn-action {
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .btn-action:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="main-container" class="max-w-7xl mx-auto">
        <!-- Header Section (Akan hilang saat Fullscreen) -->
        <header id="app-header" class="fullscreen-hide flex flex-col lg:flex-row justify-between items-center mb-8 gap-6 bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
            <div class="text-center lg:text-left">
                <h1 class="text-3xl font-extrabold tracking-tighter text-blue-600">
                    VIPER <span class="text-slate-800">BINGO DIGITAL</span>
                </h1>
                <p class="text-slate-500 text-sm font-bold uppercase tracking-widest">Update v2.3 • Storage Edition</p>
            </div>
            
            <div class="flex flex-wrap justify-center gap-3">
                <button onclick="toggleFullScreen()" class="btn-action bg-slate-100 hover:bg-slate-200 text-slate-700 px-4 py-2.5 rounded-xl font-bold border border-slate-300">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
                    Layar Penuh
                </button>
                
                <button id="undo-btn" onclick="undoCards()" disabled class="btn-action bg-amber-50 hover:bg-amber-100 text-amber-700 px-4 py-2.5 rounded-xl font-bold border border-amber-200">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14 4 9l5-5"/><path d="M4 9h10.5a5.5 5.5 0 0 1 5.5 5.5v0a5.5 5.5 0 0 1-5.5 5.5H11"/></svg>
                    Batal
                </button>

                <button id="save-btn" onclick="saveCards()" class="btn-action bg-green-600 hover:bg-green-700 text-white px-5 py-2.5 rounded-xl font-bold shadow-md active:scale-95">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                    Simpan ke HP
                </button>

                <button onclick="requestNewCards()" class="btn-action bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-xl font-bold shadow-md active:scale-95">
                    Buat Buku Baru
                </button>
            </div>
        </header>

        <!-- Status Indicator (Juga hilang saat Fullscreen) -->
        <div id="status-bar" class="fullscreen-hide mb-6 flex items-center justify-center">
            <div id="status-badge" class="px-5 py-2 rounded-full text-xs font-black tracking-widest uppercase bg-white text-slate-400 border border-slate-200 shadow-sm">
                Memuat data...
            </div>
        </div>

        <!-- Cards Grid Container -->
        <div id="bingo-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 gap-8 mb-12">
            <!-- Bingo Cards will be injected here -->
        </div>

        <!-- Footer -->
        <footer class="fullscreen-hide text-center pb-10">
            <p class="text-slate-500 font-bold text-sm">© 2024 VIPERCELL DIGITAL ENTERTAINMENT • AMBON</p>
            <p class="text-slate-400 text-[10px] mt-1">Data tersimpan otomatis di penyimpanan lokal perangkat.</p>
        </footer>
    </div>

    <!-- Notification Overlay (Durasi 2 Detik) -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-blue-600 text-white px-8 py-4 rounded-2xl shadow-2xl opacity-0 pointer-events-none transition-all duration-300 font-black z-[100] uppercase tracking-widest text-sm">
        Notifikasi
    </div>

    <script>
        const STORAGE_KEY = 'viper_bingo_save_v2';
        let currentCards = [];
        let previousCards = null;
        let isSaved = false;
        let toastTimeout = null;

        // Listener Fullscreen
        document.addEventListener('fullscreenchange', () => {
            if (document.fullscreenElement) {
                document.body.classList.add('is-fullscreen');
            } else {
                document.body.classList.remove('is-fullscreen');
            }
        });

        function showToast(msg, color = 'bg-blue-600') {
            const toast = document.getElementById('toast');
            if (toastTimeout) clearTimeout(toastTimeout);
            
            toast.innerText = msg;
            toast.className = `fixed bottom-10 left-1/2 -translate-x-1/2 ${color} text-white px-8 py-4 rounded-2xl shadow-2xl transition-all duration-300 font-black z-[100] opacity-100 uppercase tracking-widest text-sm`;
            
            // Notifikasi hilang dalam 2 detik (2000ms)
            toastTimeout = setTimeout(() => {
                toast.classList.add('opacity-0');
            }, 2000);
        }

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.error(`Error: ${err.message}`);
                });
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
            }
        }

        function getRandomNumbers(min, max, count) {
            const nums = [];
            while (nums.length < count) {
                const r = Math.floor(Math.random() * (max - min + 1)) + min;
                if (!nums.includes(r)) nums.push(r);
            }
            return nums.sort((a, b) => a - b);
        }

        function generateCardData() {
            return {
                'B': getRandomNumbers(1, 15, 5),
                'I': getRandomNumbers(16, 30, 5),
                'N': getRandomNumbers(31, 45, 5),
                'G': getRandomNumbers(46, 60, 5),
                'O': getRandomNumbers(61, 75, 5),
                'marks': [] // To save marked cells
            };
        }

        function renderCards() {
            const container = document.getElementById('bingo-container');
            container.innerHTML = '';
            
            currentCards.forEach((data, index) => {
                const cardWrapper = document.createElement('div');
                cardWrapper.className = 'bingo-card p-6 shadow-xl';
                
                let html = `
                    <div class="flex justify-between items-center mb-5 px-1">
                        <div class="flex items-center gap-2">
                            <span class="w-3 h-3 rounded-full ${isSaved ? 'bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.6)]' : 'bg-amber-500 animate-pulse'}"></span>
                            <span class="text-sm font-extrabold text-slate-700 uppercase tracking-tighter">Buku #${index + 1}</span>
                        </div>
                        <span class="text-[10px] font-black text-white bg-blue-600 px-2.5 py-1 rounded-full shadow-sm">VIPER PRO</span>
                    </div>
                    <div class="grid grid-cols-5 gap-2 text-center overflow-hidden rounded-2xl border-2 border-slate-100 bg-white shadow-inner">
                        <div class="header-col">B</div>
                        <div class="header-col">I</div>
                        <div class="header-col">N</div>
                        <div class="header-col">G</div>
                        <div class="header-col">O</div>
                `;

                for (let row = 0; row < 5; row++) {
                    ['B', 'I', 'N', 'G', 'O'].forEach(col => {
                        const cellId = `${index}-${col}-${row}`;
                        const isMarked = data.marks && data.marks.includes(cellId);
                        
                        if (col === 'N' && row === 2) {
                            html += `<div class="cell free">FREE</div>`;
                        } else {
                            const num = data[col][row];
                            html += `<div id="${cellId}" class="cell ${isMarked ? 'marked' : ''}" onclick="toggleMark('${cellId}', ${index})">${num}</div>`;
                        }
                    });
                }

                html += `</div>`;
                cardWrapper.innerHTML = html;
                container.appendChild(cardWrapper);
            });
            updateUI();
        }

        function toggleMark(id, cardIndex) {
            const el = document.getElementById(id);
            if (!el) return;
            
            el.classList.toggle('marked');
            
            // Update data marks for persistence
            if (!currentCards[cardIndex].marks) currentCards[cardIndex].marks = [];
            
            if (el.classList.contains('marked')) {
                if (!currentCards[cardIndex].marks.includes(id)) currentCards[cardIndex].marks.push(id);
            } else {
                currentCards[cardIndex].marks = currentCards[cardIndex].marks.filter(m => m !== id);
            }

            // Jika sudah tersimpan, auto-update tanda di storage
            if (isSaved) {
                localStorage.setItem(STORAGE_KEY, JSON.stringify({ cards: currentCards, isSaved: true }));
            }
        }

        function requestNewCards() {
            previousCards = JSON.parse(JSON.stringify(currentCards));
            currentCards = [generateCardData(), generateCardData(), generateCardData(), generateCardData()];
            isSaved = false;
            renderCards();
            showToast("Buku Baru Siap!", "bg-blue-600");
        }

        function undoCards() {
            if (previousCards && !isSaved) {
                currentCards = JSON.parse(JSON.stringify(previousCards));
                previousCards = null;
                renderCards();
                showToast("Kembali ke Sebelumnya", "bg-amber-600");
            }
        }

        function saveCards() {
            isSaved = true;
            previousCards = null;
            
            // Simpan ke Penyimpanan Lokal HP (LocalStorage)
            const dataToSave = {
                cards: currentCards,
                isSaved: true
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(dataToSave));
            
            updateUI();
            renderCards();
            showToast("Berhasil Simpan ke HP!", "bg-green-600");
        }

        function updateUI() {
            const undoBtn = document.getElementById('undo-btn');
            const statusBadge = document.getElementById('status-badge');
            
            undoBtn.disabled = !previousCards || isSaved;
            
            if (isSaved) {
                statusBadge.innerText = "Buku Tersimpan di Perangkat";
                statusBadge.className = "px-5 py-2 rounded-full text-xs font-black tracking-widest uppercase bg-green-100 text-green-700 border border-green-200 shadow-sm";
            } else {
                statusBadge.innerText = "Mode Draft (Belum Disimpan)";
                statusBadge.className = "px-5 py-2 rounded-full text-xs font-black tracking-widest uppercase bg-amber-100 text-amber-700 border border-amber-200 shadow-sm animate-pulse";
            }
        }

        function loadFromStorage() {
            const savedData = localStorage.getItem(STORAGE_KEY);
            if (savedData) {
                const parsed = JSON.parse(savedData);
                currentCards = parsed.cards;
                isSaved = parsed.isSaved;
                renderCards();
            } else {
                requestNewCards();
            }
        }

        window.onload = loadFromStorage;
    </script>
</body>
</html>
